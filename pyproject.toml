[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[project]
name = "bibliocli"
version = "0.1.0"
description = "Uma CLI unificada para buscar e baixar livros de fontes públicas como WikiSource, Project Gutenberg e Open Library."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
    "starlette==0.52.1",
    "typing-extensions==4.15.0",
    "typing-inspection==0.4.2",
    "pywrangler>=0.1.1",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.uv]
package = true

[project.scripts]
bibliocli = "src.infrastructure.cli.cli_app:run_cli"
bibliocli-server = "src.infrastructure.web.server:run_server"
